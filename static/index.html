<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>elysium</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --bg2: #141414;
      --border: #222;
      --dim: #444;
      --text: #ccc;
      --font: "JetBrains Mono", "Fira Mono", "Consolas", monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.6;
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
    }

    header {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #555;
    }

    #status {
      font-size: 11px;
      color: var(--dim);
    }

    #status.connected { color: #3a3; }
    #status.error     { color: #a33; }

    #scene-info {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      color: #555;
      font-size: 12px;
      flex-shrink: 0;
      display: none;
    }

    #scene-info .scene-title {
      color: #888;
      font-size: 13px;
      margin-bottom: 4px;
    }

    #topic-bar {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(10,10,10,0.96);
      text-align: center;
      gap: 10px;
      pointer-events: none;
    }

    #topic-bar.visible {
      display: flex;
      animation: topic-in 0.3s cubic-bezier(0.34, 1.4, 0.64, 1) forwards;
    }

    #topic-bar.hiding {
      animation: topic-out 0.6s ease forwards;
    }

    #topic-headline {
      font-size: clamp(32px, 8vw, 64px);
      font-weight: 900;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      line-height: 1;
    }

    #topic-text {
      font-size: clamp(13px, 2.5vw, 16px);
      color: #777;
      font-style: italic;
      max-width: 580px;
      line-height: 1.5;
      padding: 0 24px;
    }

    @keyframes topic-in {
      from { opacity: 0; transform: scale(0.85); }
      to   { opacity: 1; transform: scale(1); }
    }

    @keyframes topic-out {
      from { opacity: 1; transform: scale(1); }
      to   { opacity: 0; transform: scale(1.04); }
    }

    #feed {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      scroll-behavior: smooth;
    }

    .turn {
      margin-bottom: 20px;
      animation: fadein 0.2s ease;
    }

    @keyframes fadein {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .speaker {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .dialogue {
      color: #bbb;
      white-space: pre-wrap;
      padding-left: 12px;
      border-left: 2px solid currentColor;
    }

    .turn-error {
      color: #a33;
      font-size: 12px;
      margin-bottom: 16px;
    }

    footer {
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      flex-shrink: 0;
    }

    #btn-reset {
      background: none;
      border: 1px solid var(--border);
      color: var(--dim);
      font-family: var(--font);
      font-size: 12px;
      padding: 6px 16px;
      cursor: pointer;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      transition: border-color 0.15s, color 0.15s;
    }

    #btn-reset:hover {
      border-color: #555;
      color: #888;
    }

    #btn-reset:active {
      color: #ccc;
    }
  </style>
</head>
<body>

<div id="gate" style="
  display:none;
  position:fixed;inset:0;
  background:#0d0d0d;
  z-index:999;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:16px;
  font-family:'JetBrains Mono','Fira Mono','Consolas',monospace;
">
  <div style="color:#444;font-size:12px;letter-spacing:0.15em;text-transform:uppercase;">elysium</div>
  <input id="pin-input" type="password" placeholder="pin"
    autocomplete="current-password"
    style="
      background:#111;border:1px solid #333;color:#ccc;
      font-family:inherit;font-size:18px;
      padding:10px 16px;width:160px;text-align:center;
      outline:none;border-radius:2px;
    "
  />
  <div id="pin-error" style="color:#a33;font-size:11px;height:14px;"></div>
</div>

<header>
  <h1>elysium</h1>
  <span id="status">connecting…</span>
</header>

<div id="topic-bar">
  <div id="topic-headline"></div>
  <div id="topic-text"></div>
</div>

<div id="feed"></div>

<footer>
  <button id="btn-reset">reset</button>
</footer>

<script>
  // -------------------------------------------------------------------------
  // PIN gate — set ELYSIUM_PIN to whatever you want
  // -------------------------------------------------------------------------
  const ELYSIUM_PIN = "elysium";   // ← change this

  const gate = document.getElementById("gate");
  const pinInput = document.getElementById("pin-input");
  const pinError = document.getElementById("pin-error");

  function unlock() {
    gate.style.display = "none";
    init();
  }

  if (localStorage.getItem("elysium_auth") === ELYSIUM_PIN) {
    unlock();
  } else {
    gate.style.display = "flex";
    pinInput.focus();
    pinInput.addEventListener("keydown", (e) => {
      if (e.key !== "Enter") return;
      if (pinInput.value === ELYSIUM_PIN) {
        localStorage.setItem("elysium_auth", ELYSIUM_PIN);
        unlock();
      } else {
        pinError.textContent = "nope";
        pinInput.value = "";
        setTimeout(() => pinError.textContent = "", 1500);
      }
    });
  }

  function init() {

  // -------------------------------------------------------------------------
  // Config — backend URL auto-detected, override with ?backend=ws://…
  // -------------------------------------------------------------------------
  const params   = new URLSearchParams(location.search);
  const wsProto     = location.protocol === "https:" ? "wss" : "ws";
  const backendWs   = params.get("backend")   || `${wsProto}://${location.host}/ws`;
  const backendHttp = params.get("backendHttp") || `${location.protocol}//${location.host}`;

  // -------------------------------------------------------------------------
  // Speaker → color mapping (derived from name, consistent across reloads)
  // -------------------------------------------------------------------------
  const COLORS = [
    "#4ec9b0", // teal
    "#c586c0", // mauve
    "#dcdcaa", // yellow
    "#9cdcfe", // light blue
    "#ce9178", // orange
    "#6a9955", // green
    "#569cd6", // blue
    "#f44747", // red
  ];

  const colorCache = {};
  let colorIndex = 0;

  function colorFor(speaker) {
    if (!colorCache[speaker]) {
      colorCache[speaker] = COLORS[colorIndex % COLORS.length];
      colorIndex++;
    }
    return colorCache[speaker];
  }

  // -------------------------------------------------------------------------
  // DOM helpers
  // -------------------------------------------------------------------------
  const feed      = document.getElementById("feed");
  const statusEl  = document.getElementById("status");

  function setStatus(text, cls) {
    statusEl.textContent = text;
    statusEl.className = cls || "";
  }

  function appendTurn(speaker, dialogue) {
    const color = colorFor(speaker);
    const div = document.createElement("div");
    div.className = "turn";
    div.innerHTML = `
      <div class="speaker" style="color:${color}">${speaker}</div>
      <div class="dialogue" style="border-color:${color}">${escapeHtml(dialogue)}</div>
    `;
    feed.appendChild(div);
    feed.scrollTop = feed.scrollHeight;
  }

  function appendError(msg) {
    const div = document.createElement("div");
    div.className = "turn-error";
    div.textContent = `[error: ${msg}]`;
    feed.appendChild(div);
    feed.scrollTop = feed.scrollHeight;
  }

  function clearFeed() {
    feed.innerHTML = "";
    Object.keys(colorCache).forEach(k => delete colorCache[k]);
    colorIndex = 0;
  }

  function escapeHtml(s) {
    return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  const CATEGORY_COLORS = {
    jokes:       "#dcdcaa",
    philosophy:  "#c586c0",
    technology:  "#4ec9b0",
    history:     "#ce9178",
    science:     "#9cdcfe",
    russianlife: "#f44747",
    existential: "#aaaaaa",
    absurd:      "#6a9955",
    art:         "#569cd6",
    food:        "#d7ba7d",
  };

  // Russian display names for the big shout
  const CATEGORY_RU = {
    jokes:       "ШУТКИ",
    philosophy:  "ФИЛОСОФИЯ",
    technology:  "ТЕХНОЛОГИИ",
    history:     "ИСТОРИЯ",
    science:     "НАУКА",
    russianlife: "РУССКАЯ ЖИЗНЬ",
    existential: "ЭКЗИСТЕНЦИАЛ",
    absurd:      "АБСУРД",
    art:         "ИСКУССТВО",
    food:        "ЕДА",
  };

  const topicBar = document.getElementById("topic-bar");

  let topicHideTimer;

  function showTopic(category, points, text) {
    if (!text) return;
    const color  = CATEGORY_COLORS[category] || "#888";
    const nameRu = CATEGORY_RU[category] || category.toUpperCase();
    const bangs  = "!".repeat(Math.floor(points / 100));

    document.getElementById("topic-headline").textContent = `${nameRu} ЗА ${points}${bangs}`;
    document.getElementById("topic-headline").style.color = color;
    document.getElementById("topic-text").textContent = text;

    clearTimeout(topicHideTimer);
    topicBar.style.display = "flex";
    topicBar.style.opacity = "1";
    topicBar.style.animation = "topic-in 0.3s cubic-bezier(0.34,1.4,0.64,1) forwards";

    topicHideTimer = setTimeout(() => {
      topicBar.style.animation = "topic-out 0.6s ease forwards";
      topicBar.addEventListener("animationend", () => {
        topicBar.style.display = "none";
      }, { once: true });
    }, 3500);
  }

// -------------------------------------------------------------------------
  // WebSocket
  // -------------------------------------------------------------------------
  let ws;
  let reconnectTimer;

  function connect() {
    clearTimeout(reconnectTimer);
    ws = new WebSocket(backendWs);

    ws.onopen = () => {
      setStatus("live", "connected");
    };

    ws.onmessage = (evt) => {
      let msg;
      try { msg = JSON.parse(evt.data); } catch { return; }

      if (msg.type === "scene") {
        showTopic(msg.category, msg.points, msg.topic);
      } else if (msg.type === "turn") {
        appendTurn(msg.speaker, msg.dialogue);
      } else if (msg.type === "error") {
        appendError(msg.message);
      } else if (msg.type === "cheers") {
        const div = document.createElement("div");
        div.style.cssText = "text-align:center;padding:24px 0;font-size:28px;letter-spacing:0.1em;animation:fadein 0.4s ease";
        div.textContent = "🥃 CHEERS 🥃";
        feed.appendChild(div);
        feed.scrollTop = feed.scrollHeight;
      } else if (msg.type === "reset") {
        clearFeed();
      }
    };

    ws.onclose = () => {
      setStatus("reconnecting…", "error");
      reconnectTimer = setTimeout(connect, 2000);
    };

    ws.onerror = () => {
      setStatus("error", "error");
    };
  }

  connect();

  // -------------------------------------------------------------------------
  // Reset button
  // -------------------------------------------------------------------------
  document.getElementById("btn-reset").addEventListener("click", async () => {
    try {
      await fetch(`${backendHttp}/reset`, { method: "POST" });
      clearFeed();
    } catch (e) {
      appendError("reset failed: " + e.message);
    }
  });

  } // end init()
</script>

</body>
</html>
